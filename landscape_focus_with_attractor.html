<html lang="en">
<head>
<meta charset="UTF-8">
<title>Landscape Focus 3D</title>

<style>

#controls {
    display: flex;

    flex-wrap: wrap;
    padding: 12px 16px;
    border-bottom: 1px solid #ddd;
    background: #fafafa;

}

            <option value="ge">>=</option>

    <div class="control-block">
        <label for="selFocus">Focus node</label>

    </div>

    <div class="control-block">

    </div>
</div>

const NODES = DATA.nodes;

function ordinal(n) {
    if (10 <= (n % 100) && (n % 100) <= 20) return `${n}th`;
    if (n % 10 === 1) return `${n}st`;
    if (n % 10 === 2) return `${n}nd`;
    if (n % 10 === 3) return `${n}rd`;
    return `${n}th`;
}

function popcount(x) {
    let c = 0;
    while (x) {
        x &= (x - 1);
        c++;
    }
    return c;
}

function diffOpsJS(maskA, maskB) {
    // safe here because masks are <= 20 bits
    const rem = popcount((maskA & (~maskB)) >>> 0);
    const add = popcount((maskB & (~maskA)) >>> 0);
    return Math.max(rem, add);
}

function focusEdgeColor(d) {
    if (d <= 1) return "#000000";
    if (d === 2) return "#4B5563";
    if (d === 3) return "#888888";
    if (d === 4) return "#BBBBBB";
    return "#DDDDDD";
}

function buildSurfaceTrace(visibleNodes) {
    if (visibleNodes.length < 3) return null;

    const gridSize = DATA.surface_grid_size;
    const sigma = DATA.surface_sigma;

    const xs = visibleNodes.map(n => n.x);
    const ys = visibleNodes.map(n => n.y);
    const zs = visibleNodes.map(n => n.z);

    const pad = 0.5;
    const xmin = Math.min(...xs) - pad;
    const xmax = Math.max(...xs) + pad;
    const ymin = Math.min(...ys) - pad;
    const ymax = Math.max(...ys) + pad;

    const gx = [];
    const gy = [];
    for (let i = 0; i < gridSize; i++) {
        gx.push(xmin + (xmax - xmin) * i / (gridSize - 1));
        gy.push(ymin + (ymax - ymin) * i / (gridSize - 1));
    }

    const Z = [];
    for (let iy = 0; iy < gridSize; iy++) {
        const row = [];
        for (let ix = 0; ix < gridSize; ix++) {
            const x = gx[ix];
            const y = gy[iy];

            let zNum = 0.0;
            let zDen = 0.0;

            for (let k = 0; k < visibleNodes.length; k++) {
                const dx = x - xs[k];
                const dy = y - ys[k];
                const d2 = dx * dx + dy * dy;
                const w = Math.exp(-d2 / (2 * sigma * sigma));
                zNum += w * zs[k];
                zDen += w;
            }

            row.push(zNum / (zDen + 1e-12));
        }
        Z.push(row);
    }

    return {
        type: "surface",
        x: gx,
        y: gy,
        z: Z,
        colorscale: "Viridis",
        opacity: 0.82,
        showscale: true,
        colorbar: { title: "Smoothed reward" },
        hoverinfo: "skip",
        lighting: {
            ambient: 0.45,
            diffuse: 0.85,
            roughness: 0.9,
            specular: 0.35
        },
        name: "surface"
    };
}

               `${focusMask === null ? "" : " | focus distance ≤ " + focusDiff}`,
        scene: {
            xaxis: {
                title: "Ring X",
                showbackground: true,
                backgroundcolor: "rgb(245,245,245)"
            },
            yaxis: {
                title: "Ring Y",
                showbackground: true,
                backgroundcolor: "rgb(245,245,245)"
            },
            zaxis: {
                title: "Reward",
                showbackground: true,
                backgroundcolor: "rgb(238,238,238)"
            },
            aspectmode: "manual",
            aspectratio: { x: 1, y: 1, z: 0.9 },
            camera: {
                eye: { x: 1.9, y: 1.6, z: 1.2 }
            }
        },
        margin: { l: 0, r: 0, t: 50, b: 0 }
    };

    Plotly.newPlot("plot", traces, layout, {
        responsive: true,
        displaylogo: false
    });
}

fillControls();
render();

document.getElementById("selAttractor").addEventListener("change", render);
document.getElementById("selDiff").addEventListener("change", render);
document.getElementById("selTopK").addEventListener("change", render);
document.getElementById("selSurface").addEventListener("change", render);
document.getElementById("selRouteMode").addEventListener("change", render);
document.getElementById("selRouteSize").addEventListener("change", render);
document.getElementById("selFocus").addEventListener("change", render);
document.getElementById("selFocusDiff").addEventListener("change", render);
</script>
